<!DOCTYPE html><html><head><meta charset="utf-8"><title>B. Strava</title><style>
    :root {
      --bg: #0a0e1a; --card: #141b2d; --card2: #1c2540;
      --text: #e8eaf0; --muted: #7a8499;
      --run: #3b82f6; --run-dim: #1e3a8a;
      --lift: #f59e0b; --lift-dim: #78350f;
      --accent: #a3e635; --border: #222b44;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "SF Pro Display", "Pretendard", sans-serif;
      padding: 32px; max-width: 1200px; margin: 0 auto;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
    h2 { font-size: 20px; font-weight: 600; margin: 24px 0 12px; letter-spacing: -0.01em; }
    h3 { font-size: 14px; font-weight: 500; color: var(--muted);
          text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .nav { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .nav a {
      color: var(--muted); text-decoration: none; padding: 8px 14px;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; transition: all 0.15s;
    }
    .nav a:hover { color: var(--text); border-color: var(--accent); }
    .nav a.active { color: var(--accent); border-color: var(--accent); }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .stat-big { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; }
    .stat-label { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .pill-run { background: var(--run-dim); color: var(--run);
                  padding: 2px 10px; border-radius: 10px; font-size: 12px; }
    .pill-lift { background: var(--lift-dim); color: var(--lift);
                  padding: 2px 10px; border-radius: 10px; font-size: 12px; }
    .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
                color: var(--muted); font-size: 12px; text-align: center; }
    
    .hbar { cursor: pointer; transition: opacity 0.1s, stroke-width 0.1s; }
    .hbar:hover { opacity: 1; stroke: #fff; stroke-width: 1.5; }
    </style></head><body>

t;, &quot;primary&quot;: &quot;13.5 km&quot;, &quot;secondary&quot;: &quot;2 runs · 103 min&quot;}"></rect><text x="766.7" y="176" fill="#7a8499" font-size="10" text-anchor="middle">05</text></svg>
    </div>

<div id="hovertip" style="
  position: fixed; pointer-events: none; opacity: 0;
  background: #0a0e1a; border: 1px solid #2a3454; border-radius: 8px;
  padding: 10px 14px; font-size: 13px; color: #e8eaf0; z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); transition: opacity 0.1s;
  font-family: -apple-system, sans-serif; line-height: 1.4;
"></div>
<script>
(function() {
  const tip = document.getElementById('hovertip');
  document.querySelectorAll('[data-payload]').forEach(el => {
    el.addEventListener('mouseenter', e => {
      try {
        const data = JSON.parse(e.currentTarget.getAttribute('data-payload'));
        let html = `<div style="font-weight:600; margin-bottom:2px;">${data.date}</div>`;
        if (data.primary) html += `<div style="color:#a3e635;">${data.primary}</div>`;
        if (data.secondary) html += `<div style="color:#7a8499; font-size:11px; margin-top:2px;">${data.secondary}</div>`;
        tip.innerHTML = html;
        tip.style.opacity = '1';
      } catch (err) {}
    });
    el.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top = (e.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tip.style.opacity = '0';
    });
  });
})();
</script>

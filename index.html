<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workout Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card: #111114;
  --card2: #18181b;
  --text: #fafafa;
  --muted: #71717a;
  --run: #fafafa;
  --run-dim: #1f1f23;
  --lift: #FF1A8C;
  --lift-dim: rgba(255, 26, 140, 0.18);
  --accent: #FF1A8C;
  --border: #1f1f23;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: "Inter", -apple-system, "SF Pro Display", "Pretendard", sans-serif;
  font-feature-settings: "cv02", "cv03", "cv04";
  padding: 24px; max-width: 1200px; margin: 0 auto;
  min-height: 100vh;
}
h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.03em; }
h2 { font-size: 19px; font-weight: 500; margin: 20px 0 12px; letter-spacing: -0.02em; }
h3 { font-size: 12px; font-weight: 500; color: var(--muted);
     text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.subtitle { color: var(--muted); margin-bottom: 16px; font-size: 13px; }

.lang-toggle {
  display: inline-flex; gap: 0; margin-left: auto;
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.lang-btn {
  background: transparent; color: var(--muted);
  border: none; padding: 6px 12px; font-size: 11px;
  cursor: pointer; font-family: "JetBrains Mono", monospace;
  letter-spacing: 0.1em; transition: all 0.1s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--accent); color: var(--bg); font-weight: 600; }

.controls {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  padding: 14px 16px; border-radius: 8px; margin-bottom: 20px;
}
.controls label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
}
.controls select, .controls input[type="date"] {
  background: var(--card2); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px;
  font-family: inherit;
}
.controls select:focus, .controls input:focus {
  outline: none; border-color: var(--accent);
}
.controls input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.7);
}

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px; margin-bottom: 14px;
}
.grid { display: grid; gap: 14px; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.stat-big {
  font-family: "JetBrains Mono", "SF Mono", monospace;
  font-size: 30px; font-weight: 500; letter-spacing: -0.04em;
  font-feature-settings: "tnum";
}
.stat-label { color: var(--muted); font-size: 12px; margin-top: 4px; }
.pill-run, .pill-lift, .label-mono {
  font-family: "JetBrains Mono", "SF Mono", monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.pill-run {
  background: var(--run-dim); color: var(--run);
  padding: 2px 10px; border-radius: 10px; font-size: 10px;
}
.pill-lift {
  background: var(--lift-dim); color: var(--lift);
  padding: 2px 10px; border-radius: 10px; font-size: 10px;
}
.label-mono {
  color: var(--text); font-size: 11px; font-weight: 600;
  display: block; margin-bottom: 10px;
}

details.conventions-toggle {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 18px; margin-bottom: 14px;
}
details.conventions-toggle > summary {
  cursor: pointer; user-select: none; list-style: none;
  color: var(--muted); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; font-family: "JetBrains Mono", monospace;
  display: flex; align-items: center; justify-content: space-between;
}
details.conventions-toggle > summary::-webkit-details-marker { display: none; }
details.conventions-toggle > summary::after {
  content: "+"; font-size: 16px; transition: transform 0.2s;
}
details.conventions-toggle[open] > summary::after { content: "−"; }
details.conventions-toggle[open] > .conv-body { margin-top: 16px; }

.hcell { cursor: pointer; transition: stroke 0.1s; }
.hcell:hover { stroke: var(--text); stroke-width: 1.5; }
.hbar { cursor: pointer; transition: opacity 0.1s, stroke-width 0.1s; }
.hbar:hover { opacity: 1; stroke: var(--text); stroke-width: 1.5; }
.hdot { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; display: inline-block; }
.hdot:hover { transform: scale(1.5); box-shadow: 0 0 0 2px var(--text); z-index: 5; position: relative; }

#hovertip {
  position: fixed; pointer-events: none; opacity: 0;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 13px; color: var(--text); z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); transition: opacity 0.1s;
  font-family: inherit; line-height: 1.4;
}

#customRange { display: flex; gap: 10px; }
#customRange.disabled { opacity: 0.5; pointer-events: none; }

.footer {
  margin-top: 36px; padding-top: 14px; border-top: 1px solid var(--border);
  color: var(--muted); font-size: 11px; text-align: center;
}
</style>
</head>

    daysUnit: "일", daysShort: "days", noRun: "no run", noLift: "no lift",
    bodyComp: "체성분", weight: "체중", bodyFatPct: "체지방률",
    leanMass: "근육량", vo2max: "VO2 Max",
    latest: "최근", change: "변화", noBodyData: "기간 내 데이터 없음",
    restDay: "Rest day", runPlus: "Run + Lift",
    runsUnit: "runs", minUnit: "min", kgVolume: "kg volume",
    setsUnit: "sets", periodDays: "일 기간",
    darkerMore: "진할수록 그날 더 많이 뛰었음",
    threeKmPlus: "3km+ 기준", autoRefresh: "매일 자동 갱신",
  },
  en: {
    title: "Workout Dashboard", view: "View", period: "Period", from: "From", to: "To",
    "all": "All time", "1y": "Last 1 year", "3m": "Last 3 months", "1m": "Last 1 month", "1w": "Last 1 week", "custom": "Custom",
    currentStreak: "Current streak", bestStreak: "Best streak", last7days: "Last 7 days",
    consecutive: "Consecutive workout days", longest: "Longest in period", recent: "Recent week",
    intensityHeatmap: "Intensity Heatmap", activityOverview: "Activity Overview", consistency: "Consistency",
    periodTotal: "Period Total", distance: "Distance", runCount: "Run Count", totalCalories: "Total Calories",
    monthlyDistance: "Monthly Distance", volume: "Volume", sessions: "Sessions", totalSets: "Total Sets",

    longestDistance: "Longest Distance", fastestPace: "Fastest Pace", totalDistance: "Total Distance",
    noPrData: "No PR data in period", noData: "No data",
    daysUnit: "days", daysShort: "days", noRun: "no run", noLift: "no lift",

    darkerMore: "Darker = more distance that day",

  }
};
let LANG = "ko";
function t(key) { return (TRANSLATIONS[LANG] || TRANSLATIONS.ko)[key] || key; }

// Tracked-since dates for header labels
const RUN_TRACKED_SINCE = "2025-04-05";
const LIFT_TRACKED_SINCE = "2023-07-16";

// === Utilities ===
function parseDateOnly(s) {
  // Accepts "YYYY-MM-DD" or full ISO; returns Date at local midnight (or original time)
  if (s.length === 10) return new Date(s + "T00:00:00");
  return new Date(s);
}
function dateOnly(s) { return s.slice(0, 10); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function isoDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function fmtPace(p) {
  if (!p || p <= 0) return "-";
  const m = Math.floor(p), s = Math.round((p - m) * 60);
  return `${m}'${String(s).padStart(2,"0")}"`;
}
function num(n, decimals=0) {
  if (n == null) return "-";
  return n.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

// === Range computation ===
function computeRange(rangeKey) {
  const today = new Date();
  today.setHours(23,59,59,999);
  switch(rangeKey) {
    case "all": {
      // earliest = min date across all data types (runs, lifts, body)
      let earliest = today;
      const allEntries = [
        ...DATA.runs, ...DATA.lifts,
        ...((DATA.body && DATA.body.weight) || []),
        ...((DATA.body && DATA.body.bodyFat) || []),
        ...((DATA.body && DATA.body.leanMass) || []),
        ...((DATA.body && DATA.body.vo2max) || []),
      ];
      for (const r of allEntries) {
        const d = parseDateOnly(r.date);
        if (d < earliest) earliest = d;
      }
      return [earliest, today];
    }
    case "1y": return [addDays(today, -365), today];
    case "3m": return [addDays(today, -90), today];
    case "1m": return [addDays(today, -30), today];
    case "1w": return [addDays(today, -7), today];
    case "custom": {
      const f = document.getElementById("customFrom").value;
      const t = document.getElementById("customTo").value;
      const from = f ? new Date(f + "T00:00:00") : addDays(today, -365);
      const to = t ? new Date(t + "T23:59:59") : today;
      return [from, to];
    }
  }
  return [addDays(today, -365), today];
}

function inRange(dateStr, start, end) {
  const d = parseDateOnly(dateStr);
  return d >= start && d <= end;
}

// === Aggregation ===
function aggregate(runs, lifts, start, end) {
  const filteredRuns = runs.filter(r => inRange(r.date, start, end));
  const filteredLifts = lifts.filter(l => inRange(l.date, start, end));

  // Group runs by date for session-based counting (gap > 3h = separate session)
  const SESSION_GAP_MS = 3 * 3600 * 1000;
  const runsByDate = {};
  for (const r of filteredRuns) {
    const d = dateOnly(r.date);
    if (!runsByDate[d]) runsByDate[d] = [];
    runsByDate[d].push(r);
  }
  const runByDay = {};
  for (const [d, rs] of Object.entries(runsByDate)) {
    const sorted = rs.slice().sort((a, b) => new Date(a.date) - new Date(b.date));
    let sessions = 0, lastTime = null, dist = 0, dur = 0;
    for (const r of sorted) {
      const t = new Date(r.date);
      if (lastTime === null || (t - lastTime) > SESSION_GAP_MS) sessions++;
      lastTime = t;
      dist += r.distance || 0;
      dur += r.duration || 0;
    }
    runByDay[d] = {count: sessions, distance: dist, duration: dur};
  }

  const liftByDay = {};
  for (const l of filteredLifts) {
    const d = dateOnly(l.date);
    if (!liftByDay[d]) liftByDay[d] = {sets:0, volume:0, exercises:new Set()};
    liftByDay[d].sets++;
    liftByDay[d].volume += (l.weight || 0) * (l.reps || 0);
    if (l.exercise) liftByDay[d].exercises.add(l.exercise);
  }

  const runByMonth = {}, liftByMonth = {};
  // Monthly run counts: roll up session-deduped daily counts
  for (const [d, dayData] of Object.entries(runByDay)) {
    const ym = d.slice(0,7);
    if (!runByMonth[ym]) runByMonth[ym] = {count:0, distance:0, duration:0};
    runByMonth[ym].count += dayData.count;
    runByMonth[ym].distance += dayData.distance;
    runByMonth[ym].duration += dayData.duration;
  }
  for (const l of filteredLifts) {
    const ym = l.date.slice(0,7);
    if (!liftByMonth[ym]) liftByMonth[ym] = {sets:0, volume:0, sessions: new Set()};
    liftByMonth[ym].sets++;
    liftByMonth[ym].volume += (l.weight || 0) * (l.reps || 0);
    liftByMonth[ym].sessions.add(dateOnly(l.date));
  }
  for (const v of Object.values(liftByMonth)) v.sessions = v.sessions.size;

  // PRs
  const prByExercise = {};
  for (const l of filteredLifts) {
    if (!l.exercise) continue;
    if (!prByExercise[l.exercise]) prByExercise[l.exercise] = {maxWeight:0, maxDate:"", sessions:new Set()};
    const e = prByExercise[l.exercise];
    if ((l.weight || 0) > e.maxWeight) {
      e.maxWeight = l.weight || 0;
      e.maxDate = dateOnly(l.date);
    }
    e.sessions.add(dateOnly(l.date));
  }
  for (const v of Object.values(prByExercise)) v.sessions = v.sessions.size;

  // Streak
  const allDates = Array.from(new Set([...Object.keys(runByDay), ...Object.keys(liftByDay)])).sort();
  let currentStreak = 0;
  if (allDates.length) {
    const today = new Date();
    let d = new Date(today);
    const set = new Set(allDates);
    while (set.has(isoDate(d))) {
      currentStreak++;
      d = addDays(d, -1);
    }
    if (currentStreak === 0 && set.has(isoDate(addDays(today, -1)))) {
      d = addDays(today, -1);
      while (set.has(isoDate(d))) { currentStreak++; d = addDays(d, -1); }
    }
  }
  let bestStreak = 0, cur = 0, prev = null;
  for (const ds of allDates) {
    const d = parseDateOnly(ds);
    if (prev == null || (d - prev) === 86400000) cur++;
    else cur = 1;
    if (cur > bestStreak) bestStreak = cur;
    prev = d;
  }

  // Totals
  let totalDist=0, totalDur=0, totalCal=0;
  for (const r of filteredRuns) {
    totalDist += r.distance || 0;
    totalDur += r.duration || 0;
    totalCal += r.calories || 0;
  }
  let totalSets=0, totalVol=0;
  for (const l of filteredLifts) {
    totalSets++;
    totalVol += (l.weight || 0) * (l.reps || 0);
  }

  return {
    runByDay, liftByDay, runByMonth, liftByMonth, prByExercise,
    currentStreak, bestStreak,
    totalsRun: {count: Object.values(runByDay).reduce((s, d) => s + d.count, 0), distance: totalDist, duration: totalDur, calories: totalCal},
    totalsLift: {sets: totalSets, volume: totalVol, sessions: Object.keys(liftByDay).length},
    rangeStart: start, rangeEnd: end,
    runDays: Object.keys(runByDay).length,
    liftDays: Object.keys(liftByDay).length,
  };
}

// === View: Heatmap ===
function renderHeatmap(agg) {
  const start = agg.rangeStart, end = agg.rangeEnd;
  const days = Math.floor((end - start) / 86400000) + 1;
  const useYearStack = days > 400;
  const cell = 14, gap = 3;

  function buildOneRange(rangeStart, rangeEnd, byDay, color, kind, valueKey, maxVal) {
    let s = new Date(rangeStart);
    while (s.getDay() !== 1) s = addDays(s, -1); // Monday-start
    const cols = Math.ceil(((rangeEnd - s) / 86400000 + 1) / 7);
    const labelW = 16;
    const w = labelW + cols * (cell + gap);
    const h = 7 * (cell + gap) + 20;

    // Weekday labels (MTWTFSS) on the left
    const weekdayChars = ["M","T","W","T","F","S","S"];
    const wdayLabels = weekdayChars.map((ch, idx) =>
      `<text x="0" y="${idx*(cell+gap)+16+cell*0.75}" fill="${COLORS.muted}" font-size="9" font-family="JetBrains Mono, SF Mono, monospace" letter-spacing="0">${ch}</text>`
    ).join("");

    const rects = [];
    const monthLabels = [];
    let cur = new Date(s);
    let lastMonth = -1;
    for (let c = 0; c < cols; c++) {
      for (let r = 0; r < 7; r++) {
        if (cur > rangeEnd) { cur = addDays(cur, 1); continue; }
        if (cur < rangeStart) { cur = addDays(cur, 1); continue; }
        const iso = isoDate(cur);
        const data = byDay[iso] || {};
        const val = data[valueKey] || 0;
        let fillColor = "rgba(255,255,255,0.04)";
        let opacity = 1;
        if (val > 0) {
          fillColor = color;
          opacity = 0.3 + 0.7 * Math.min(val / maxVal, 1);
        }
        const wd = WEEKDAYS[cur.getDay() === 0 ? 6 : cur.getDay()-1];
        let primary, secondary;
        if (kind === "run") {
          primary = data.distance ? `${data.distance.toFixed(2)} km` : t("noRun");
          if (val > 0) {
            const dayPace = data.distance > 0 ? data.duration / data.distance : 0;
            secondary = `${data.count} ${t("runsUnit")} · ${Math.round(data.duration)} ${t("minUnit")} · ${fmtPace(dayPace)}`;
          } else { secondary = ""; }
        } else {
          primary = data.sets ? `${data.sets} ${t("setsUnit")}` : t("noLift");
          secondary = val > 0 ? `${num(data.volume, 0)} ${t("kgVolume")}` : "";
        }
        const payload = JSON.stringify({date: `${iso} (${wd})`, primary, secondary}).replace(/"/g, "&quot;");
        rects.push(`<rect x="${labelW + c*(cell+gap)}" y="${r*(cell+gap)+16}" width="${cell}" height="${cell}" rx="3" fill="${fillColor}" opacity="${opacity.toFixed(2)}" class="hcell" data-payload="${payload}"></rect>`);
        cur = addDays(cur, 1);
      }
      // month label
      if (cur <= rangeEnd && cur.getMonth() !== lastMonth && cur.getDate() <= 7) {
        monthLabels.push(`<text x="${labelW + c*(cell+gap)}" y="12" fill="${COLORS.muted}" font-size="10">${MONTH_NAMES[cur.getMonth()]}</text>`);
        lastMonth = cur.getMonth();
      }
    }
    return `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${wdayLabels}${monthLabels.join("")}${rects.join("")}</svg>`;
  }

  function buildHeatmap(byDay, color, kind, valueKey) {
    const vals = Object.values(byDay).map(d => d[valueKey] || 0);
    const maxVal = Math.max(1, ...vals);
    if (useYearStack) {
      const startYear = start.getFullYear();
      const endYear = end.getFullYear();
      const out = [];
      for (let y = endYear; y >= startYear; y--) {
        const ys = new Date(Math.max(start, new Date(y, 0, 1)));
        const ye = new Date(Math.min(end, new Date(y, 11, 31, 23, 59, 59)));
        out.push(`<div style="margin-bottom:6px;"><div style="color:var(--muted); font-size:11px; margin-bottom:4px;">${y}</div>${buildOneRange(ys, ye, byDay, color, kind, valueKey, maxVal)}</div>`);
      }
      return out.join("");
    }
    return buildOneRange(start, end, byDay, color, kind, valueKey, maxVal);
  }

  const tr = agg.totalsRun, tl = agg.totalsLift;

  // Stats cards (merged from Habit view)
  const today = new Date(); today.setHours(23,59,59,999);
  let week_done = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(today, -i);
    if (d < start) break;
    const iso = isoDate(d);
    if ((agg.runByDay[iso] && agg.runByDay[iso].count > 0) || (agg.liftByDay[iso] && agg.liftByDay[iso].sets > 0)) week_done++;
  }
  const cleanDaysDone = new Set([...Object.keys(agg.runByDay), ...Object.keys(agg.liftByDay)]).size;
  const consistency = ((cleanDaysDone / Math.max(days,1)) * 100).toFixed(0);

  // Combined activity dot grid (merged from Habit)
  const dotsHtml = [];
  for (let i = 0; i < days; i++) {
    const d = addDays(start, i);
    if (d > end) break;
    const iso = isoDate(d);
    const wd = WEEKDAYS[d.getDay() === 0 ? 6 : d.getDay()-1];
    const r = agg.runByDay[iso], l = agg.liftByDay[iso];
    const hasR = r && r.count > 0, hasL = l && l.sets > 0;
    let color, primary, secondary;
    let extraStyle = "";
    if (hasR && hasL) {
      color = COLORS.lift; primary = t("runPlus");
      secondary = `${r.distance.toFixed(1)} km · ${l.sets} ${t("setsUnit")} (${num(l.volume, 0)} kg)`;
      extraStyle = "box-shadow: 0 0 0 2px var(--text);";
    } else if (hasR) {
      color = COLORS.run; primary = `${r.distance.toFixed(2)} km`;
      secondary = `${r.count} ${t("runsUnit")} · ${Math.round(r.duration)} ${t("minUnit")}`;
    } else if (hasL) {
      color = COLORS.lift; primary = `${l.sets} ${t("setsUnit")}`;
      secondary = `${num(l.volume, 0)} ${t("kgVolume")}`;
    } else {
      color = "rgba(255,255,255,0.04)"; primary = t("restDay"); secondary = "";
    }
    const payload = JSON.stringify({date: `${iso} (${wd})`, primary, secondary}).replace(/"/g, "&quot;");
    dotsHtml.push(`<div class="hdot" data-payload="${payload}" style="width:14px; height:14px; border-radius:50%; background:${color}; ${extraStyle}"></div>`);
  }
  const cols = Math.min(53, Math.max(7, Math.ceil(Math.sqrt(days * 1.5))));

  return `
    <div class="grid grid-3">
      <div class="card"><h3>${t("currentStreak")}</h3><div class="stat-big" style="color:var(--accent);">${agg.currentStreak}<span style="font-size:14px; color:var(--muted)"> ${t("daysShort")}</span></div><div class="stat-label">${t("consecutive")}</div></div>
      <div class="card"><h3>${t("bestStreak")}</h3><div class="stat-big">${agg.bestStreak}<span style="font-size:14px; color:var(--muted)"> ${t("daysShort")}</span></div><div class="stat-label">${t("longest")}</div></div>
      <div class="card"><h3>${t("last7days")}</h3><div class="stat-big">${week_done}<span style="font-size:14px; color:var(--muted)"> / 7</span></div><div class="stat-label">${t("recent")}</div></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:12px;">
        <div><span class="pill-run">RUNNING</span><span style="color:var(--muted); font-size:11px; margin-left:8px; font-family: 'JetBrains Mono', monospace;">since ${RUN_TRACKED_SINCE}</span><h2 style="margin-top:4px;">${t("intensityHeatmap")}</h2></div>
        <div style="text-align:right;">
          <div class="stat-big" style="font-size:26px; color:var(--run);">${tr.distance.toFixed(0)}<span style="font-size:14px; color:var(--muted)"> km</span></div>
          <div class="stat-label">${tr.count} ${t("runsUnit")} · ${num(tr.duration, 0)} ${t("minUnit")}</div>
        </div>
      </div>
      <div style="overflow-x:auto;">${buildHeatmap(agg.runByDay, COLORS.run, "run", "distance")}</div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:12px;">
        <div><span class="pill-lift">LIFTING</span><span style="color:var(--muted); font-size:11px; margin-left:8px; font-family: 'JetBrains Mono', monospace;">since ${LIFT_TRACKED_SINCE}</span><h2 style="margin-top:4px;">${t("intensityHeatmap")}</h2></div>
        <div style="text-align:right;">
          <div class="stat-big" style="font-size:26px; color:var(--lift);">${tl.sessions}<span style="font-size:14px; color:var(--muted)"> ${t("sessions").toLowerCase()}</span></div>
          <div class="stat-label">${tl.sets} ${t("setsUnit")} · ${num(tl.volume, 0)} kg</div>
        </div>
      </div>
      <div style="overflow-x:auto;">${buildHeatmap(agg.liftByDay, COLORS.lift, "lift", "sets")}</div>
    </div>

    <div class="card">
      <h2>${t("activityOverview")} (${days}${t("periodDays")} · ${isoDate(start)} ~ ${isoDate(end)})</h2>
      <p style="color:var(--muted); font-size:13px; margin-bottom:12px;">
        <span style="display:inline-block;width:10px;height:10px;background:${COLORS.run};border-radius:50%;margin-right:4px;"></span> Running
        <span style="display:inline-block;width:10px;height:10px;background:${COLORS.lift};border-radius:50%;margin:0 4px 0 8px;"></span> Lifting
        <span style="display:inline-block;width:10px;height:10px;background:${COLORS.lift};border-radius:50%;box-shadow:0 0 0 2px var(--text);margin:0 4px 0 12px;"></span> Both
      </p>
      <div style="display:grid; grid-template-columns:repeat(${cols}, 1fr); gap:3px;">${dotsHtml.join("")}</div>
      <p style="color:var(--muted); margin-top:14px; font-size:13px;">${t("consistency")}: <strong style="color:var(--accent)">${consistency}%</strong> (${cleanDaysDone}/${days} ${t("daysUnit")})</p>
    </div>`;
}

// === View: Strava ===
function renderStrava(agg) {
  const tr = agg.totalsRun, tl = agg.totalsLift;
  const days = Math.floor((agg.rangeEnd - agg.rangeStart) / 86400000) + 1;
  const monthsR = Object.keys(agg.runByMonth).sort().slice(-12);
  const monthsL = Object.keys(agg.liftByMonth).sort().slice(-12);
  const cw = 800, ch = 180;

  function bars(months, byMonth, color, kind) {
    if (!months.length) return `<p style="color:var(--muted)">${t("noData")}</p>`;
    const maxV = Math.max(1, ...months.map(m => kind==="run" ? byMonth[m].distance : byMonth[m].volume));
    const out = [];
    months.forEach((m, i) => {
      const md = byMonth[m];
      const v = kind==="run" ? md.distance : md.volume;
      const x = (i + 0.5) * (cw / months.length);
      const bw = (cw / months.length) * 0.6;
      const bx = x - bw / 2;
      const by = ch - 20 - (v / maxV) * (ch - 50);
      const bh = (v / maxV) * (ch - 50);
      const primary = kind === "run" ? `${v.toFixed(1)} km` : `${num(v, 0)} kg volume`;
      const secondary = kind === "run" ? `${md.count} runs · ${Math.round(md.duration)} min` : `${md.sets} sets · ${md.sessions} sessions`;
      const payload = JSON.stringify({date: m, primary, secondary}).replace(/"/g, "&quot;");
      out.push(`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${color}" opacity="0.7" rx="2" class="hbar" data-payload="${payload}"></rect>`);
      out.push(`<text x="${x.toFixed(1)}" y="${ch-4}" fill="${COLORS.muted}" font-size="10" text-anchor="middle">${m.slice(5)}</text>`);
    });
    return `<svg width="${cw}" height="${ch}" xmlns="http://www.w3.org/2000/svg">${out.join("")}</svg>`;
  }

  return `
    <h2><span class="pill-run">RUNNING</span> ${t("periodTotal")}</h2>
    <div class="grid grid-3">
      <div class="card"><h3>${t("distance")}</h3><div class="stat-big">${tr.distance.toFixed(1)}<span style="font-size:14px; color:var(--muted)"> km</span></div><div class="stat-label">${days}${t("periodDays")}</div></div>
      <div class="card"><h3>${t("runCount")}</h3><div class="stat-big">${tr.count}</div><div class="stat-label">${num(tr.duration, 0)} ${t("minUnit")}</div></div>
      <div class="card"><h3>${t("totalCalories")}</h3><div class="stat-big">${num(tr.calories, 0)}<span style="font-size:14px; color:var(--muted)"> kcal</span></div><div class="stat-label">${tr.count > 0 ? (tr.calories/tr.count).toFixed(0) : 0} kcal/run</div></div>
    </div>
    <div class="card"><h3>${t("monthlyDistance")}</h3>${bars(monthsR, agg.runByMonth, COLORS.run, "run")}</div>

    <h2><span class="pill-lift">LIFTING</span> ${t("periodTotal")}</h2>
    <div class="grid grid-3">
      <div class="card"><h3>${t("volume")}</h3><div class="stat-big">${num(tl.volume, 0)}<span style="font-size:14px; color:var(--muted)"> kg</span></div></div>
      <div class="card"><h3>${t("sessions")}</h3><div class="stat-big">${tl.sessions}</div></div>
      <div class="card"><h3>${t("totalSets")}</h3><div class="stat-big">${tl.sets}</div></div>
    </div>
    <div class="card"><h3>${t("monthlyVolume")}</h3>${bars(monthsL, agg.liftByMonth, COLORS.lift, "lift")}</div>`;
}

// === View: Hevy ===
function renderHevy(agg) {
  const prList = Object.entries(agg.prByExercise)
    .filter(([_, info]) => info.maxWeight > 0)
    .sort((a,b) => b[1].maxWeight - a[1].maxWeight);
  const cards = prList.length === 0
    ? `<div class="card"><p style="color:var(--muted)">${t("noPrData")}</p></div>`
    : prList.slice(0, 12).map(([name, info]) =>
        `<div class="card" style="margin:0;"><h3>${name}</h3>
         <div class="stat-big">${info.maxWeight.toFixed(1)}<span style="font-size:14px; color:var(--muted)"> kg</span></div>
         <div class="stat-label">PR · ${info.maxDate} · ${info.sessions} ${t("sessions").toLowerCase()}</div></div>`
      ).join("");

  // Body part frequency from runs/lifts (simplified - use lift count)
  const tr = agg.totalsRun, tl = agg.totalsLift;
  const days = Math.floor((agg.rangeEnd - agg.rangeStart) / 86400000) + 1;

  return `
    <h2><span class="pill-lift">LIFTING</span> Personal Records</h2>
    <div class="grid grid-3">${cards}</div>

    <h2><span class="pill-run">RUNNING</span> ${t("stats")}</h2>
    <div class="card">
      <div class="grid grid-3">
        <div><h3>${t("longestDistance")}</h3><div class="stat-big" style="font-size:22px; color:var(--run);">
          ${(() => { let mx=0; for (const r of DATA.runs) if (inRange(r.date, agg.rangeStart, agg.rangeEnd) && (r.distance||0)>mx) mx=r.distance; return mx.toFixed(2); })()} km
        </div></div>
        <div><h3>${t("fastestPace")}</h3><div class="stat-big" style="font-size:22px; color:var(--run);">
          ${(() => { let mn=99; for (const r of DATA.runs) if (inRange(r.date, agg.rangeStart, agg.rangeEnd) && r.pace && r.distance>=3 && r.pace<mn) mn=r.pace; return mn===99 ? "-" : fmtPace(mn); })()}
        </div><div class="stat-label">${t("threeKmPlus")}</div></div>
        <div><h3>${t("totalDistance")}</h3><div class="stat-big" style="font-size:22px; color:var(--run);">${tr.distance.toFixed(0)} km</div><div class="stat-label">${days}${t("periodDays")}</div></div>
      </div>
    </div>`;
}

// === View: Habit ===
function renderHabit(agg) {
  const start = agg.rangeStart, end = agg.rangeEnd;
  const days = Math.floor((end - start) / 86400000) + 1;
  const dotsHtml = [];
  for (let i = 0; i < days; i++) {
    const d = addDays(start, i);
    if (d > end) break;
    const iso = isoDate(d);
    const wd = WEEKDAYS[d.getDay() === 0 ? 6 : d.getDay()-1];
    const r = agg.runByDay[iso], l = agg.liftByDay[iso];
    const hasR = r && r.count > 0, hasL = l && l.sets > 0;
    let color, primary, secondary;
    let extraStyle = "";
    if (hasR && hasL) {
      color = COLORS.lift; primary = t("runPlus");
      secondary = `${r.distance.toFixed(1)} km · ${l.sets} ${t("setsUnit")} (${num(l.volume, 0)} kg)`;
      extraStyle = "box-shadow: 0 0 0 2px var(--text);";
    } else if (hasR) {
      color = COLORS.run; primary = `${r.distance.toFixed(2)} km`;
      secondary = `${r.count} ${t("runsUnit")} · ${Math.round(r.duration)} ${t("minUnit")}`;
    } else if (hasL) {
      color = COLORS.lift; primary = `${l.sets} ${t("setsUnit")}`;
      secondary = `${num(l.volume, 0)} ${t("kgVolume")}`;
    } else {
      color = "rgba(255,255,255,0.04)"; primary = t("restDay"); secondary = "";
    }
    const payload = JSON.stringify({date: `${iso} (${wd})`, primary, secondary}).replace(/"/g, "&quot;");
    dotsHtml.push(`<div class="hdot" data-payload="${payload}" style="width:14px; height:14px; border-radius:50%; background:${color}; ${extraStyle}"></div>`);
  }

  const daysDone = agg.runDays + agg.liftDays - new Set([...Object.keys(agg.runByDay).filter(d => agg.liftByDay[d])]).size;
  const cleanDaysDone = new Set([...Object.keys(agg.runByDay), ...Object.keys(agg.liftByDay)]).size;
  const consistency = ((cleanDaysDone / Math.max(days,1)) * 100).toFixed(0);

  // Last 7 days within range
  const today = new Date(); today.setHours(23,59,59,999);
  let week_done = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(today, -i);
    if (d < start) break;
    const iso = isoDate(d);
    if ((agg.runByDay[iso] && agg.runByDay[iso].count > 0) || (agg.liftByDay[iso] && agg.liftByDay[iso].sets > 0)) week_done++;
  }

  // grid columns: scale based on count
  const cols = Math.min(53, Math.max(7, Math.ceil(Math.sqrt(days * 1.5))));

  return `
    <div class="grid grid-3">
      <div class="card"><h3>현재 streak</h3><div class="stat-big" style="color:var(--accent);">${agg.currentStreak}<span style="font-size:14px; color:var(--muted)"> days</span></div><div class="stat-label">연속 운동 일수</div></div>
      <div class="card"><h3>최고 streak</h3><div class="stat-big">${agg.bestStreak}<span style="font-size:14px; color:var(--muted)"> days</span></div><div class="stat-label">기간 내 최장</div></div>
      <div class="card"><h3>지난 7일</h3><div class="stat-big">${week_done}<span style="font-size:14px; color:var(--muted)"> / 7</span></div><div class="stat-label">최근 일주일</div></div>
    </div>
    <div class="card">
      <h3>${days}일 기간 (${isoDate(start)} ~ ${isoDate(end)})</h3>
      <p style="color:var(--muted); font-size:13px; margin-bottom:12px;">
        <span style="display:inline-block;width:10px;height:10px;background:${COLORS.run};border-radius:50%;margin-right:4px;"></span> Running
        <span style="display:inline-block;width:10px;height:10px;background:${COLORS.lift};border-radius:50%;margin:0 4px 0 8px;"></span> Lifting
        <span style="display:inline-block;width:10px;height:10px;background:${COLORS.lift};border-radius:50%;box-shadow:0 0 0 2px var(--text);margin:0 4px 0 12px;"></span> Both
      </p>
      <div style="display:grid; grid-template-columns:repeat(${cols}, 1fr); gap:3px;">${dotsHtml.join("")}</div>
      <p style="color:var(--muted); margin-top:14px; font-size:13px;">일관성: <strong style="color:var(--accent)">${consistency}%</strong> (${cleanDaysDone}/${days} 일)</p>
    </div>
    <div class="grid grid-2">
      <div class="card"><h3><span class="pill-run">RUNNING</span> 기간 내</h3><div class="stat-big" style="color:var(--run);">${agg.totalsRun.distance.toFixed(1)}<span style="font-size:14px; color:var(--muted)"> km</span></div><div class="stat-label">${agg.totalsRun.count} runs</div></div>
      <div class="card"><h3><span class="pill-lift">LIFTING</span> 기간 내</h3><div class="stat-big" style="color:var(--lift);">${agg.totalsLift.sessions}<span style="font-size:14px; color:var(--muted)"> 일</span></div><div class="stat-label">${num(agg.totalsLift.volume, 0)} kg volume</div></div>
    </div>`;
}

// === Main render dispatcher ===
function renderBody(agg) {
  const body = DATA.body || {};
  const start = agg.rangeStart, end = agg.rangeEnd;
  const inRng = arr => (arr || []).filter(d => {
    const dt = parseDateOnly(d.date);
    return dt >= start && dt <= end;
  });
  const series = {
    weight: { data: inRng(body.weight), label: t("weight"), unit: "kg", color: COLORS.run, betterDown: false },
    bodyFat: { data: inRng(body.bodyFat), label: t("bodyFatPct"), unit: "%", color: COLORS.lift, betterDown: true },
    leanMass: { data: inRng(body.leanMass), label: t("leanMass"), unit: "kg", color: COLORS.accent, betterDown: false },
    vo2max: { data: inRng(body.vo2max), label: t("vo2max"), unit: "mL/min·kg", color: "#22d3ee", betterDown: false },
  };

  function lineChart(points, color) {
    if (!points.length) return `<p style="color:var(--muted); padding:20px 0;">${t("noBodyData")}</p>`;
    const w = 800, h = 160, padX = 40, padTop = 16, padBot = 24;
    const minV = Math.min(...points.map(p => p.value));
    const maxV = Math.max(...points.map(p => p.value));
    const range = (maxV - minV) || 1;
    const minT = parseDateOnly(points[0].date).getTime();
    const maxT = parseDateOnly(points[points.length-1].date).getTime();
    const tRange = (maxT - minT) || 1;
    const xS = t => padX + (t - minT) / tRange * (w - 2*padX);
    const yS = v => h - padBot - (v - minV) / range * (h - padTop - padBot);

    const pathD = points.map((p, i) => {
      const x = xS(parseDateOnly(p.date).getTime());
      const y = yS(p.value);
      return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");

    const dots = points.map(p => {
      const x = xS(parseDateOnly(p.date).getTime());
      const y = yS(p.value);
      const payload = JSON.stringify({date: p.date, primary: `${p.value.toFixed(1)}`, secondary: p.source || ""}).replace(/"/g, "&quot;");
      return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${color}" class="hcell" data-payload="${payload}"></circle>`;
    }).join("");

    // Y axis labels: min and max
    const yMinLabel = `<text x="0" y="${(h-padBot+4).toFixed(1)}" fill="${COLORS.muted}" font-size="9" font-family="JetBrains Mono, monospace">${minV.toFixed(1)}</text>`;
    const yMaxLabel = `<text x="0" y="${(padTop+4).toFixed(1)}" fill="${COLORS.muted}" font-size="9" font-family="JetBrains Mono, monospace">${maxV.toFixed(1)}</text>`;

    // X axis labels: first and last date
    const firstDate = `<text x="${padX}" y="${h-4}" fill="${COLORS.muted}" font-size="9" text-anchor="start">${points[0].date}</text>`;
    const lastDate = `<text x="${w-padX}" y="${h-4}" fill="${COLORS.muted}" font-size="9" text-anchor="end">${points[points.length-1].date}</text>`;

    return `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
      <path d="${pathD}" stroke="${color}" stroke-width="1.5" fill="none" opacity="0.9"/>
      ${dots}${yMinLabel}${yMaxLabel}${firstDate}${lastDate}
    </svg>`;
  }

  function changeIndicator(points, betterDown) {
    if (points.length < 2) return "";
    const first = points[0].value;
    const last = points[points.length-1].value;
    const diff = last - first;
    if (Math.abs(diff) < 0.01) return `<span style="color:var(--muted);">±0</span>`;
    const isPositive = diff > 0;
    const isGood = betterDown ? !isPositive : isPositive;
    const color = isGood ? COLORS.accent : "#f87171";
    const sign = isPositive ? "+" : "";
    return `<span style="color:${color}; font-family:'JetBrains Mono', monospace;">${sign}${diff.toFixed(1)}</span>`;
  }

  function smallCard(s) {
    if (s.data.length === 0) {
      return `<div class="card"><h3>${s.label}</h3><div class="stat-big" style="color:var(--muted); font-size:24px;">—</div></div>`;
    }
    const latest = s.data[s.data.length - 1];
    return `<div class="card">
      <h3>${s.label}</h3>
      <div class="stat-big" style="color:${s.color}; font-size:26px;">${latest.value.toFixed(1)}<span style="font-size:13px; color:var(--muted)"> ${s.unit}</span></div>
      <div class="stat-label">${t("latest")} ${latest.date} · ${changeIndicator(s.data, s.betterDown)} ${s.unit}</div>
    </div>`;
  }

  function chartCard(s) {
    return `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <h3 style="margin:0;">${s.label}</h3>
        <span style="color:var(--muted); font-size:11px; font-family:'JetBrains Mono', monospace;">${s.data.length} pts</span>
      </div>
      <div style="overflow-x:auto;">${lineChart(s.data, s.color)}</div>
    </div>`;
  }

  // Hero: muscle mass card with embedded chart
  const m = series.leanMass;
  let heroHtml = "";
  if (m.data.length > 0) {
    const latest = m.data[m.data.length-1];
    const earliest = m.data[0];
    const diff = latest.value - earliest.value;
    const diffSign = diff > 0 ? "+" : "";
    const diffColor = diff > 0 ? COLORS.accent : "#f87171";
    heroHtml = `
      <div class="card" style="background: linear-gradient(135deg, var(--card) 0%, ${COLORS.lift}10 100%); border-color: ${COLORS.accent}40;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
          <div>
            <span class="label-mono" style="color:var(--accent);">${m.label}</span>
            <div style="font-family:'JetBrains Mono', monospace; font-size:48px; font-weight:500; letter-spacing:-0.04em; color:var(--accent); line-height:1; margin-top:4px;">
              ${latest.value.toFixed(1)}<span style="font-size:18px; color:var(--muted)"> kg</span>
            </div>
            <div class="stat-label" style="margin-top:8px;">
              ${earliest.date} → ${latest.date} ·
              <span style="color:${diffColor}; font-family:'JetBrains Mono', monospace;">${diffSign}${diff.toFixed(1)} kg</span>
            </div>
          </div>
        </div>
        <div style="overflow-x:auto;">${lineChart(m.data, COLORS.accent)}</div>
      </div>`;
  } else {
    heroHtml = `<div class="card"><h3>${m.label}</h3><p style="color:var(--muted)">${t("noBodyData")}</p></div>`;
  }

  // Smaller cards for the rest
  const smallSeries = [series.bodyFat, series.weight, series.vo2max];
  const smallCards = smallSeries.map(smallCard).join("");
  const smallCharts = smallSeries.map(chartCard).join("");

  return `
    <h2>${t("bodyComp")}</h2>
    ${heroHtml}
    <div class="grid grid-3">${smallCards}</div>
    ${smallCharts}`;
}

const VIEWS = { heatmap: renderHeatmap, strava: renderStrava, hevy: renderHevy, body: renderBody };

function bindTooltips() {
  const tip = document.getElementById("hovertip");
  document.querySelectorAll("[data-payload]").forEach(el => {
    el.addEventListener("mouseenter", e => {
      try {
        const data = JSON.parse(e.currentTarget.getAttribute("data-payload"));
        let html = `<div style="font-weight:600; margin-bottom:2px;">${data.date}</div>`;
        if (data.primary) html += `<div style="color:#a3e635;">${data.primary}</div>`;
        if (data.secondary) html += `<div style="color:#7a8499; font-size:11px; margin-top:2px;">${data.secondary}</div>`;
        tip.innerHTML = html;
        tip.style.opacity = "1";
      } catch (err) {}
    });
    el.addEventListener("mousemove", e => {
      tip.style.left = (e.clientX + 14) + "px";
      tip.style.top = (e.clientY - 10) + "px";
    });
    el.addEventListener("mouseleave", () => { tip.style.opacity = "0"; });
  });
}

function renderConventions() {
  const KO = {
    title: "기록 기준",
    runHead: "RUNNING",
    runItems: [
      "2025-04-05부터 기록 (이전 데이터 archive)",
      "출처: Nike Run Club · Apple Watch · Strava (Apple Health 통합)",
      "중복 제거: 5분 + 20% 거리 유사 시 같은 운동 → duration 낮은 것 유지",
      "0.5km 미만 / 거리 누락 / Apple Watch가 NRC와 겹치는 row archive",
      "페이스 ≥ 10'/km는 워킹/계단기로 판정, archive",
      "세션 카운트: 같은 날 3시간 이상 간격이면 별개 세션",
    ],
    liftHead: "LIFTING",
    liftItems: [
      "2023-07-16부터 기록",
      "출처: Fleek (텍스트 paste)",
      "1 row = 1 세트 (한 워크아웃 = 여러 행)",
      "볼륨 = 무게 × 횟수",
      "1RM 추정: Epley 공식",
    ],
    bodyHead: "BODY",
    bodyItems: [
      "출처: OntoFit (스마트 체중계) + Apple Watch (VO2Max)",
      "체중 / 체지방률 / 제지방량 / VO2Max 시계열",
      "Apple Health export 시점 기준 갱신",
    ],
  };
  const EN = {
    title: "Data Conventions",
    runHead: "RUNNING",
    runItems: [
      "Tracked since 2025-04-05",
      "Sources: Nike Run Club · Apple Watch · Strava (via Apple Health)",
      "Dedup: same run within 5min + 20% distance → keep lower duration",
      "Cleanup: <0.5km, missing distance, AW-overlapping-NRC rows archived",
      "Pace ≥ 10'/km treated as walking/stair-stepper, archived",
      "Sessions: 3h+ gap on same day = separate session",
    ],
    liftHead: "LIFTING",
    liftItems: [
      "Tracked since 2023-07-16",
      "Source: Fleek (text paste)",
      "1 row = 1 set (one workout = many rows)",
      "Volume = weight × reps",
      "1RM Est: Epley formula",
    ],
    bodyHead: "BODY",
    bodyItems: [
      "Source: OntoFit (smart scale) + Apple Watch (VO2Max)",
      "Weight / body fat % / lean mass / VO2Max time series",
      "Refreshed on Apple Health re-export",
    ],
  };
  const c = LANG === "ko" ? KO : EN;
  const renderItems = items => items.map(i => `<li style="padding-left:14px; text-indent:-14px;">·  ${i}</li>`).join("");
  return `
    <details class="conventions-toggle">
      <summary>${c.title}</summary>
      <div class="conv-body" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px;">
        <div>
          <span class="label-mono">${c.runHead}</span>
          <ul style="list-style:none; padding:0; margin:0; color:var(--muted); font-size:11px; line-height:1.8;">
            ${renderItems(c.runItems)}
          </ul>
        </div>
        <div>
          <span class="label-mono">${c.liftHead}</span>
          <ul style="list-style:none; padding:0; margin:0; color:var(--muted); font-size:11px; line-height:1.8;">
            ${renderItems(c.liftItems)}
          </ul>
        </div>
        <div>
          <span class="label-mono">${c.bodyHead}</span>
          <ul style="list-style:none; padding:0; margin:0; color:var(--muted); font-size:11px; line-height:1.8;">
            ${renderItems(c.bodyItems)}
          </ul>
        </div>
      </div>
    </details>`;
}

function refresh() {
  const view = document.getElementById("viewSelect").value;
  const range = document.getElementById("rangeSelect").value;
  const [start, end] = computeRange(range);

  // Sync From/To inputs with computed range (unless user is editing custom)
  if (range !== "custom") {
    document.getElementById("customFrom").value = isoDate(start);
    document.getElementById("customTo").value = isoDate(end);
  }

  const customWrap = document.getElementById("customRange");
  customWrap.classList.toggle("disabled", range !== "custom");

  const agg = aggregate(DATA.runs, DATA.lifts, start, end);
  const html = VIEWS[view](agg);
  document.getElementById("content").innerHTML = html;
  document.getElementById("conventions").innerHTML = renderConventions();
  bindTooltips();

  // Update URL state
  const params = new URLSearchParams();
  params.set("view", view);
  params.set("range", range);
  if (range === "custom") {
    const f = document.getElementById("customFrom").value;
    const t = document.getElementById("customTo").value;
    if (f) params.set("from", f);
    if (t) params.set("to", t);
  }
  history.replaceState(null, "", "?" + params.toString());
}

function rebuildRangeOptions() {
  const sel = document.getElementById("rangeSelect");
  const cur = sel.value || "all";
  sel.innerHTML = ["all","1y","3m","1m","1w","custom"].map(k =>
    `<option value="${k}">${t(k)}</option>`).join("");
  sel.value = cur;
}

function applyLangToStaticUI() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  rebuildRangeOptions();
  document.documentElement.lang = LANG;
  document.querySelectorAll(".lang-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === LANG));
}

function setLang(lang) {
  LANG = lang;
  localStorage.setItem("dashboardLang", lang);
  applyLangToStaticUI();
  refresh();
}

// === Init ===
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(location.search);
  const viewSel = document.getElementById("viewSelect");
  const rangeSel = document.getElementById("rangeSelect");

  // Language: URL > localStorage > default en
  LANG = params.get("lang") || localStorage.getItem("dashboardLang") || "en";

  viewSel.value = params.get("view") || "heatmap";
  rangeSel.value = params.get("range") || "all";
  if (params.get("from")) document.getElementById("customFrom").value = params.get("from");
  if (params.get("to")) document.getElementById("customTo").value = params.get("to");

  applyLangToStaticUI();

  ["change", "input"].forEach(evt => {
    viewSel.addEventListener(evt, refresh);
    rangeSel.addEventListener(evt, refresh);
    document.getElementById("customFrom").addEventListener(evt, () => {
      if (rangeSel.value === "custom") refresh();
    });
    document.getElementById("customTo").addEventListener(evt, () => {
      if (rangeSel.value === "custom") refresh();
    });
  });

  document.querySelectorAll(".lang-btn").forEach(b =>
    b.addEventListener("click", () => setLang(b.dataset.lang)));

  refresh();
});

</script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Design Samples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-body);
  padding: 32px; max-width: 1200px; margin: 0 auto;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
h1 {
  font-family: var(--font-heading);
  font-size: var(--h1-size, 28px);
  font-weight: var(--h1-weight, 700);
  letter-spacing: var(--h1-spacing, -0.02em);
  margin-bottom: 6px;
}
h2 {
  font-family: var(--font-heading);
  font-size: var(--h2-size, 20px);
  font-weight: var(--h2-weight, 600);
  letter-spacing: var(--h2-spacing, -0.01em);
  margin: 24px 0 14px;
}
h3 {
  font-family: var(--font-h3, var(--font-body));
  font-size: var(--h3-size, 13px);
  font-weight: var(--h3-weight, 500);
  color: var(--muted);
  text-transform: var(--h3-transform, uppercase);
  letter-spacing: var(--h3-spacing, 0.08em);
  margin-bottom: 8px;
}
.subtitle { color: var(--muted); margin-bottom: 20px; font-size: 13px; }

.theme-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 24px; padding: 12px;
  background: rgba(255,255,255,0.04);
  border-radius: var(--radius, 12px);
}
.theme-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 8px 14px;
  border-radius: var(--radius-sm, 8px);
  font-size: 13px; cursor: pointer; font-family: var(--font-body);
  transition: all 0.15s;
}
.theme-btn:hover { color: var(--text); border-color: var(--accent); }
.theme-btn.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}
.theme-desc { color: var(--muted); font-size: 12px; margin-bottom: 16px; padding-left: 4px; }

.controls {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  background: var(--card); backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border: 1px solid var(--border);
  padding: 14px 16px; border-radius: var(--radius, 12px);
  margin-bottom: 20px;
  box-shadow: var(--card-shadow, none);
}
.controls label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
  font-family: var(--font-body);
}
.controls select, .controls input[type="date"] {
  background: var(--input-bg, var(--card));
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm, 6px);
  padding: 6px 10px; font-size: 13px;
  font-family: inherit;
}
.controls select:focus, .controls input:focus { outline: none; border-color: var(--accent); }
.controls input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }

.card {
  background: var(--card); backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border: 1px solid var(--border);
  border-radius: var(--radius, 12px);
  padding: var(--card-padding, 20px);
  margin-bottom: 14px;
  box-shadow: var(--card-shadow, none);
}
.grid { display: grid; gap: 14px; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.stat-big {
  font-family: var(--font-stat, var(--font-heading));
  font-size: var(--stat-size, 32px);
  font-weight: var(--stat-weight, 700);
  letter-spacing: var(--stat-spacing, -0.03em);
  font-feature-settings: "tnum";
}
.stat-label { color: var(--muted); font-size: 13px; margin-top: 4px; }
.pill-run {
  background: var(--run-dim); color: var(--run);
  padding: 2px 10px; border-radius: 10px; font-size: 12px;
  font-family: var(--font-body); letter-spacing: 0.05em;
}
.pill-lift {
  background: var(--lift-dim); color: var(--lift);
  padding: 2px 10px; border-radius: 10px; font-size: 12px;
  font-family: var(--font-body); letter-spacing: 0.05em;
}
.hcell { cursor: pointer; transition: stroke 0.1s; }
.hcell:hover { stroke: var(--text); stroke-width: 1.5; }
.hbar { cursor: pointer; transition: opacity 0.1s, stroke-width 0.1s; }
.hbar:hover { opacity: 1; stroke: var(--text); stroke-width: 1.5; }
.hdot {
  cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  display: inline-block;
}
.hdot:hover {
  transform: scale(1.5);
  box-shadow: 0 0 0 2px var(--text);
  z-index: 5; position: relative;
}

#hovertip {
  position: fixed; pointer-events: none; opacity: 0;
  background: var(--card-solid, var(--bg));
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 13px; color: var(--text); z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); transition: opacity 0.1s;
  font-family: var(--font-body); line-height: 1.4;
  backdrop-filter: blur(20px);
}

#customRange { display: flex; gap: 10px; }
#customRange.disabled { opacity: 0.5; pointer-events: none; }

.footer {
  margin-top: 36px; padding-top: 14px; border-top: 1px solid var(--border);
  color: var(--muted); font-size: 11px; text-align: center;
}

        body.theme-apple {
          --bg: #000;
          --card: rgba(28, 28, 30, 0.72);
          --card-solid: #1c1c1e;
          --card-blur: blur(40px) saturate(180%);
          --text: #fafafa;
          --muted: #8e8e93;
          --run: #0a84ff;
          --run-dim: rgba(10, 132, 255, 0.18);
          --lift: #ff9500;
          --lift-dim: rgba(255, 149, 0, 0.18);
          --accent: #30d158;
          --border: rgba(255, 255, 255, 0.08);
          --input-bg: rgba(255, 255, 255, 0.05);
          --radius: 16px;
          --radius-sm: 10px;
          --font-body: -apple-system, "SF Pro Display", "Pretendard", sans-serif;
          --font-heading: -apple-system, "SF Pro Display", sans-serif;
          --h1-spacing: -0.04em;
          --stat-spacing: -0.04em;
          --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
          background:
            radial-gradient(circle at 20% 0%, #1c1c1e 0%, transparent 50%),
            radial-gradient(circle at 80% 100%, #2c2c2e 0%, transparent 50%),
            #000;
        }
        body.theme-apple .controls,
        body.theme-apple .card { background: var(--card); }
        

        body.theme-linear {
          --bg: #0a0a0a;
          --card: #111114;
          --card-solid: #111114;
          --card-blur: none;
          --text: #fafafa;
          --muted: #71717a;
          --run: #fafafa;
          --run-dim: #18181b;
          --lift: #c084fc;
          --lift-dim: #2e1065;
          --accent: #c084fc;
          --border: #1f1f23;
          --input-bg: #18181b;
          --radius: 8px;
          --radius-sm: 6px;
          --font-body: "Inter", -apple-system, sans-serif;
          --font-heading: "Inter", sans-serif;
          --font-stat: "JetBrains Mono", "SF Mono", monospace;
          --h1-spacing: -0.03em;
          --h1-weight: 600;
          --h2-weight: 500;
          --stat-weight: 500;
          --stat-spacing: -0.04em;
          --card-padding: 18px;
        }
        body.theme-linear h1, body.theme-linear h2 { font-feature-settings: "cv02", "cv03"; }
        body.theme-linear .pill-run, body.theme-linear .pill-lift {
          font-family: "JetBrains Mono", monospace; font-size: 10px;
          text-transform: uppercase; letter-spacing: 0.1em;
        }
        

        body.theme-editorial {
          --bg: #14110f;
          --card: #1c1815;
          --card-solid: #1c1815;
          --card-blur: none;
          --text: #f0e3d0;
          --muted: #8a7a68;
          --run: #d4a574;
          --run-dim: rgba(212, 165, 116, 0.18);
          --lift: #c8956d;
          --lift-dim: rgba(200, 149, 109, 0.18);
          --accent: #d4a574;
          --border: #2d2722;
          --input-bg: #1c1815;
          --radius: 4px;
          --radius-sm: 3px;
          --font-body: "Inter", "Pretendard", sans-serif;
          --font-heading: "Playfair Display", "Cormorant Garamond", serif;
          --font-stat: "Playfair Display", serif;
          --font-h3: "Inter", sans-serif;
          --h1-size: 36px;
          --h1-weight: 400;
          --h1-spacing: -0.01em;
          --h2-size: 24px;
          --h2-weight: 500;
          --h2-spacing: 0;
          --h3-size: 11px;
          --h3-spacing: 0.18em;
          --stat-size: 36px;
          --stat-weight: 400;
          --stat-spacing: -0.02em;
          --card-padding: 28px;
          line-height: 1.7;
        }
        body.theme-editorial h1, body.theme-editorial h2 {
          font-style: normal;
        }
        body.theme-editorial .stat-big { font-style: italic; }
        body.theme-editorial .pill-run, body.theme-editorial .pill-lift {
          letter-spacing: 0.15em; text-transform: uppercase; font-size: 10px;
        }
        

        body.theme-glass {
          --bg: #1c1c1f;
          --card: rgba(255, 255, 255, 0.04);
          --card-solid: #25252a;
          --card-blur: blur(20px) saturate(150%);
          --text: #ebe9e6;
          --muted: #8b8680;
          --run: #93b8e3;
          --run-dim: rgba(147, 184, 227, 0.15);
          --lift: #d4ad7a;
          --lift-dim: rgba(212, 173, 122, 0.15);
          --accent: #b4a7d6;
          --border: rgba(255, 255, 255, 0.08);
          --input-bg: rgba(255, 255, 255, 0.04);
          --radius: 14px;
          --radius-sm: 10px;
          --font-body: "Inter", "Pretendard", sans-serif;
          --font-heading: "Inter", sans-serif;
          --h1-weight: 600;
          --h2-weight: 500;
          --stat-weight: 600;
          --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
          background:
            radial-gradient(at 20% 10%, #2a2530 0%, transparent 50%),
            radial-gradient(at 80% 90%, #2a2c30 0%, transparent 50%),
            #1c1c1f;
        }
        body.theme-glass .controls, body.theme-glass .card {
          background: var(--card);
        }
        </style>
</head>
<body>
<h1>운동 대시보드 — 디자인 샘플</h1>
<p class="subtitle">163 runs · 39 lift sets · 2026-05-05</p>

      <option value="1w">지난 1주</option>
      <option value="custom">Custom</option>

  </label>
  <span id="customRange">
    <label>From <input type="date" id="customFrom"></label>
    <label>To <input type="date" id="customTo"></label>
  </span>
</div>

<div id="content"></div>
<div id="hovertip"></div>
<div class="footer">Design samples · pick the one you like, I'll apply it to the main dashboard</div>

        if (kind === "run") {
          primary = data.distance ? `${data.distance.toFixed(2)} km` : "no run";
          secondary = val > 0 ? `${data.count} runs · ${Math.round(data.duration)} min` : "";
        } else {
          primary = data.sets ? `${data.sets} sets` : "no lift";
          secondary = val > 0 ? `${num(data.volume, 0)} kg volume` : "";
        }
        const payload = JSON.stringify({date: `${iso} (${wd})`, primary, secondary}).replace(/"/g, "&quot;");
        rects.push(`<rect x="${c*(cell+gap)}" y="${r*(cell+gap)+16}" width="${cell}" height="${cell}" rx="3" fill="${fill}" opacity="${opacity.toFixed(2)}" class="hcell" data-payload="${payload}"></rect>`);
        cur = addDays(cur, 1);
      }
      if (cur <= re && cur.getMonth() !== lastMonth && cur.getDate() <= 7) {
        monthLabels.push(`<text x="${c*(cell+gap)}" y="12" fill="${C.muted}" font-size="10">${MONTH_NAMES[cur.getMonth()]}</text>`);
        lastMonth = cur.getMonth();
      }
    }
    return `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${monthLabels.join("")}${rects.join("")}</svg>`;
  }
  function buildHeatmap(byDay, color, kind, valueKey) {
    const vals = Object.values(byDay).map(d => d[valueKey] || 0);
    const maxVal = Math.max(1, ...vals);
    if (useYearStack) {
      const startYear = start.getFullYear(), endYear = end.getFullYear();
      const out = [];
      for (let y = endYear; y >= startYear; y--) {
        const ys = new Date(Math.max(start, new Date(y, 0, 1)));
        const ye = new Date(Math.min(end, new Date(y, 11, 31, 23, 59, 59)));
        out.push(`<div style="margin-bottom:6px;"><div style="color:${C.muted}; font-size:11px; margin-bottom:4px;">${y}</div>${buildOneRange(ys, ye, byDay, color, kind, valueKey, maxVal)}</div>`);
      }
      return out.join("");
    }
    return buildOneRange(start, end, byDay, color, kind, valueKey, maxVal);
  }

  const tr = agg.totalsRun, tl = agg.totalsLift;
  const today = new Date(); today.setHours(23,59,59,999);
  let week_done = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(today, -i);
    if (d < start) break;
    const iso = isoDate(d);
    if ((agg.runByDay[iso]&&agg.runByDay[iso].count>0) || (agg.liftByDay[iso]&&agg.liftByDay[iso].sets>0)) week_done++;
  }
  const cleanDaysDone = new Set([...Object.keys(agg.runByDay), ...Object.keys(agg.liftByDay)]).size;
  const consistency = ((cleanDaysDone / Math.max(days,1)) * 100).toFixed(0);

  const dotsHtml = [];
  for (let i = 0; i < days; i++) {
    const d = addDays(start, i);
    if (d > end) break;
    const iso = isoDate(d);
    const wd = WEEKDAYS[d.getDay() === 0 ? 6 : d.getDay()-1];
    const r = agg.runByDay[iso], l = agg.liftByDay[iso];
    const hasR = r&&r.count>0, hasL = l&&l.sets>0;
    let color, primary, secondary;
    if (hasR && hasL) { color = C.accent; primary = "Run + Lift"; secondary = `${r.distance.toFixed(1)} km · ${l.sets} sets (${num(l.volume,0)} kg)`; }
    else if (hasR) { color = C.run; primary = `${r.distance.toFixed(2)} km`; secondary = `${r.count} runs · ${Math.round(r.duration)} min`; }
    else if (hasL) { color = C.lift; primary = `${l.sets} sets`; secondary = `${num(l.volume,0)} kg volume`; }
    else { color = "rgba(255,255,255,0.04)"; primary = "Rest day"; secondary = ""; }
    const payload = JSON.stringify({date: `${iso} (${wd})`, primary, secondary}).replace(/"/g, "&quot;");
    dotsHtml.push(`<div class="hdot" data-payload="${payload}" style="width:14px; height:14px; border-radius:50%; background:${color};"></div>`);
  }
  const cols = Math.min(53, Math.max(7, Math.ceil(Math.sqrt(days * 1.5))));

  return `
    <div class="grid grid-3">
      <div class="card"><h3>현재 streak</h3><div class="stat-big" style="color:${C.accent};">${agg.currentStreak}<span style="font-size:14px; color:${C.muted}"> days</span></div><div class="stat-label">연속 운동 일수</div></div>
      <div class="card"><h3>최고 streak</h3><div class="stat-big">${agg.bestStreak}<span style="font-size:14px; color:${C.muted}"> days</span></div><div class="stat-label">기간 내 최장</div></div>
      <div class="card"><h3>지난 7일</h3><div class="stat-big">${week_done}<span style="font-size:14px; color:${C.muted}"> / 7</span></div><div class="stat-label">최근 일주일</div></div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:12px;">
        <div><span class="pill-run">RUNNING</span><h2 style="margin-top:4px;">강도 히트맵</h2></div>
        <div style="text-align:right;">
          <div class="stat-big" style="font-size:26px; color:${C.run};">${tr.distance.toFixed(0)}<span style="font-size:14px; color:${C.muted}"> km</span></div>
          <div class="stat-label">${tr.count} runs · ${num(tr.duration,0)} min</div>
        </div>
      </div>
      <div style="overflow-x:auto;">${buildHeatmap(agg.runByDay, C.run, "run", "distance")}</div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:12px;">
        <div><span class="pill-lift">LIFTING</span><h2 style="margin-top:4px;">강도 히트맵</h2></div>
        <div style="text-align:right;">
          <div class="stat-big" style="font-size:26px; color:${C.lift};">${tl.sessions}<span style="font-size:14px; color:${C.muted}"> sessions</span></div>
          <div class="stat-label">${tl.sets} sets · ${num(tl.volume,0)} kg</div>
        </div>
      </div>
      <div style="overflow-x:auto;">${buildHeatmap(agg.liftByDay, C.lift, "lift", "sets")}</div>
    </div>
    <div class="card">
      <h2>활동 종합 (${days}일 · ${isoDate(start)} ~ ${isoDate(end)})</h2>
      <p style="color:${C.muted}; font-size:13px; margin-bottom:12px;">
        <span style="display:inline-block;width:10px;height:10px;background:${C.run};border-radius:50%;margin-right:4px;"></span> Running
        <span style="display:inline-block;width:10px;height:10px;background:${C.lift};border-radius:50%;margin:0 4px 0 8px;"></span> Lifting
        <span style="display:inline-block;width:10px;height:10px;background:${C.accent};border-radius:50%;margin:0 4px 0 8px;"></span> Both
      </p>
      <div style="display:grid; grid-template-columns:repeat(${cols}, 1fr); gap:3px;">${dotsHtml.join("")}</div>
      <p style="color:${C.muted}; margin-top:14px; font-size:13px;">일관성: <strong style="color:${C.accent}">${consistency}%</strong> (${cleanDaysDone}/${days} 일)</p>
    </div>`;
}

function renderStrava(agg) {
  const C = getColors();
  const tr = agg.totalsRun, tl = agg.totalsLift;
  const days = Math.floor((agg.rangeEnd - agg.rangeStart) / 86400000) + 1;
  const monthsR = Object.keys(agg.runByMonth).sort().slice(-12);
  const monthsL = Object.keys(agg.liftByMonth).sort().slice(-12);
  const cw = 800, ch = 180;
  function bars(months, byMonth, color, kind) {
    if (!months.length) return `<p style="color:${C.muted}">데이터 없음</p>`;
    const maxV = Math.max(1, ...months.map(m => kind==="run" ? byMonth[m].distance : byMonth[m].volume));
    const out = [];
    months.forEach((m, i) => {
      const md = byMonth[m];
      const v = kind==="run" ? md.distance : md.volume;
      const x = (i + 0.5) * (cw / months.length);
      const bw = (cw / months.length) * 0.6;
      const bx = x - bw / 2;
      const by = ch - 20 - (v / maxV) * (ch - 50);
      const bh = (v / maxV) * (ch - 50);
      const primary = kind === "run" ? `${v.toFixed(1)} km` : `${num(v, 0)} kg volume`;
      const secondary = kind === "run" ? `${md.count} runs · ${Math.round(md.duration)} min` : `${md.sets} sets · ${md.sessions} sessions`;
      const payload = JSON.stringify({date: m, primary, secondary}).replace(/"/g, "&quot;");
      out.push(`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${color}" opacity="0.7" rx="2" class="hbar" data-payload="${payload}"></rect>`);
      out.push(`<text x="${x.toFixed(1)}" y="${ch-4}" fill="${C.muted}" font-size="10" text-anchor="middle">${m.slice(5)}</text>`);
    });
    return `<svg width="${cw}" height="${ch}" xmlns="http://www.w3.org/2000/svg">${out.join("")}</svg>`;
  }
  return `
    <h2><span class="pill-run">RUNNING</span> 기간 합계</h2>
    <div class="grid grid-3">
      <div class="card"><h3>거리</h3><div class="stat-big">${tr.distance.toFixed(1)}<span style="font-size:14px; color:${C.muted}"> km</span></div><div class="stat-label">${days}일 기간</div></div>
      <div class="card"><h3>러닝 횟수</h3><div class="stat-big">${tr.count}</div><div class="stat-label">총 ${num(tr.duration, 0)} 분</div></div>
      <div class="card"><h3>총 칼로리</h3><div class="stat-big">${num(tr.calories, 0)}<span style="font-size:14px; color:${C.muted}"> kcal</span></div></div>
    </div>
    <div class="card"><h3>월별 거리</h3>${bars(monthsR, agg.runByMonth, C.run, "run")}</div>
    <h2><span class="pill-lift">LIFTING</span> 기간 합계</h2>
    <div class="grid grid-3">
      <div class="card"><h3>볼륨</h3><div class="stat-big">${num(tl.volume, 0)}<span style="font-size:14px; color:${C.muted}"> kg</span></div></div>
      <div class="card"><h3>세션</h3><div class="stat-big">${tl.sessions}</div></div>
      <div class="card"><h3>총 세트</h3><div class="stat-big">${tl.sets}</div></div>
    </div>
    <div class="card"><h3>월별 볼륨</h3>${bars(monthsL, agg.liftByMonth, C.lift, "lift")}</div>`;
}

function renderHevy(agg) {
  const C = getColors();
  const prList = Object.entries(agg.prByExercise).filter(([_, info]) => info.maxWeight > 0).sort((a,b) => b[1].maxWeight - a[1].maxWeight);
  const cards = prList.length === 0
    ? `<div class="card"><p style="color:${C.muted}">기간 내 PR 데이터 없음</p></div>`
    : prList.slice(0, 12).map(([name, info]) => `<div class="card" style="margin:0;"><h3>${name}</h3><div class="stat-big">${info.maxWeight.toFixed(1)}<span style="font-size:14px; color:${C.muted}"> kg</span></div><div class="stat-label">PR · ${info.maxDate} · ${info.sessions} sessions</div></div>`).join("");
  const tr = agg.totalsRun;
  const days = Math.floor((agg.rangeEnd - agg.rangeStart) / 86400000) + 1;
  return `
    <h2><span class="pill-lift">LIFTING</span> Personal Records</h2>
    <div class="grid grid-3">${cards}</div>
    <h2><span class="pill-run">RUNNING</span> 통계</h2>
    <div class="card"><div class="grid grid-3">
      <div><h3>가장 긴 거리</h3><div class="stat-big" style="font-size:22px; color:${C.run};">${(() => { let mx=0; for (const r of DATA.runs) if (inRange(r.date, agg.rangeStart, agg.rangeEnd) && (r.distance||0)>mx) mx=r.distance; return mx.toFixed(2); })()} km</div></div>
      <div><h3>가장 빠른 페이스</h3><div class="stat-big" style="font-size:22px; color:${C.run};">${(() => { let mn=99; for (const r of DATA.runs) if (inRange(r.date, agg.rangeStart, agg.rangeEnd) && r.pace && r.distance>=3 && r.pace<mn) mn=r.pace; return mn===99 ? "-" : fmtPace(mn); })()}</div><div class="stat-label">3km+ 기준</div></div>
      <div><h3>총 누적 거리</h3><div class="stat-big" style="font-size:22px; color:${C.run};">${tr.distance.toFixed(0)} km</div><div class="stat-label">${days}일</div></div>
    </div></div>`;
}

const VIEWS = { heatmap: renderHeatmap, strava: renderStrava, hevy: renderHevy };

function bindTooltips() {
  const tip = document.getElementById("hovertip");
  document.querySelectorAll("[data-payload]").forEach(el => {
    el.addEventListener("mouseenter", e => {
      try {
        const data = JSON.parse(e.currentTarget.getAttribute("data-payload"));
        let html = `<div style="font-weight:600; margin-bottom:2px;">${data.date}</div>`;
        if (data.primary) html += `<div style="color:${cssVar('accent')};">${data.primary}</div>`;
        if (data.secondary) html += `<div style="color:${cssVar('muted')}; font-size:11px; margin-top:2px;">${data.secondary}</div>`;
        tip.innerHTML = html; tip.style.opacity = "1";
      } catch(err) {}
    });
    el.addEventListener("mousemove", e => { tip.style.left = (e.clientX+14)+"px"; tip.style.top = (e.clientY-10)+"px"; });
    el.addEventListener("mouseleave", () => { tip.style.opacity = "0"; });
  });
}

function refresh() {
  const view = document.getElementById("viewSelect").value;
  const range = document.getElementById("rangeSelect").value;
  const [start, end] = computeRange(range);
  document.getElementById("customRange").classList.toggle("disabled", range !== "custom");
  const agg = aggregate(DATA.runs, DATA.lifts, start, end);
  document.getElementById("content").innerHTML = VIEWS[view](agg);
  bindTooltips();
}

function setTheme(name) {
  document.body.className = "theme-" + name;
  document.querySelectorAll(".theme-btn").forEach(b => b.classList.toggle("active", b.dataset.theme === name));
  document.getElementById("themeDesc").textContent = THEME_DESCS[name];
  // Re-render so colors propagate (heatmap fill colors need fresh CSS values)
  refresh();
  localStorage.setItem("dashboardTheme", name);
}

document.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("dashboardTheme") || "apple";
  setTheme(saved);
  document.getElementById("viewSelect").value = "heatmap";
  document.getElementById("rangeSelect").value = "all";
  ["change","input"].forEach(evt => {
    document.getElementById("viewSelect").addEventListener(evt, refresh);
    document.getElementById("rangeSelect").addEventListener(evt, refresh);
    document.getElementById("customFrom").addEventListener(evt, () => { if (document.getElementById("rangeSelect").value === "custom") refresh(); });
    document.getElementById("customTo").addEventListener(evt, () => { if (document.getElementById("rangeSelect").value === "custom") refresh(); });
  });
  document.querySelectorAll(".theme-btn").forEach(b => b.addEventListener("click", () => setTheme(b.dataset.theme)));
  refresh();
});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routines">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Routines Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --surface-2: #161616;
    --border: #1f1f23;
    --text: #fafafa;
    --muted: #71717a;
    --accent: #FF1A8C;
    --gold: #fbbf24;
    --green: #84cc16;
    --silver: #cbd5e1;
    --section-morning: #fbbf24;
    --section-focus: #06b6d4;
    --section-workout: #FF1A8C;
    --section-discipline: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Inter", -apple-system, "SF Pro Display", "Pretendard", sans-serif;
    padding: 16px; max-width: 600px; margin: 0 auto;
    min-height: 100vh; padding-bottom: 80px;
  }
  @media (max-width: 480px) { body { padding: 12px; } }
  .nav-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .nav-links { display: flex; gap: 4px; background: var(--surface-2); border-radius: 8px; padding: 2px; }
  .nav-link {
    padding: 6px 12px; font-size: 12px; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); text-decoration: none; border-radius: 6px;
    letter-spacing: 0.05em;
  }
  .nav-link.active { background: var(--surface); color: var(--text); }
  .label-mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 600; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }

  /* Date navigation */
  .date-nav { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .date-btn {
    background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
    width: 40px; height: 40px; border-radius: 8px; font-size: 16px; cursor: pointer;
  }
  .date-display {
    flex: 1; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--text);
  }
  .date-display .dow { color: var(--muted); margin-left: 4px; }
  .today-btn {
    background: var(--accent); color: #fff; border: none; padding: 8px 14px;
    border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer;
    letter-spacing: 0.05em;
  }
  .today-btn[disabled] { opacity: 0.4; cursor: default; }

  /* Progress + streak */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px;
  }
  .stat-card .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--accent); }
  .stat-card .stat-label { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em; margin-top: 2px; }
  .progress-bar-bg { background: var(--surface-2); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .progress-bar-fill { background: var(--accent); height: 100%; border-radius: 3px; transition: width 0.3s; }

  /* Sections */
  .section-header {
    display: flex; align-items: center; gap: 8px;
    margin: 16px 0 8px; padding-left: 4px;
  }
  .section-header .section-icon { font-size: 16px; }
  .section-header h3 {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 500;
  }

  /* Checkbox items */
  .item {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 6px; cursor: pointer; transition: all 0.15s;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .item:active { transform: scale(0.99); }
  .item.checked {
    background: rgba(132, 204, 22, 0.06);
    border-color: rgba(132, 204, 22, 0.3);
  }
  .checkbox {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .item.checked .checkbox {
    background: var(--green); border-color: var(--green);
  }
  .item.checked .checkbox::after {
    content: "✓"; color: #000; font-weight: 700; font-size: 16px;
  }
  .item-label {
    flex: 1; font-size: 15px; color: var(--text);
  }
  .item.checked .item-label {
    color: var(--muted); text-decoration: line-through;
  }
  .item-note {
    font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
  }
  .auto-badge {
    background: rgba(255,26,140,0.15); color: var(--accent);
    padding: 2px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em;
  }

  /* Login screen */
  .login-screen {
    min-height: 70vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    text-align: center;
  }
  .login-screen h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .login-screen p { color: var(--muted); max-width: 320px; font-size: 14px; }
  .signin-btn {
    background: #fff; color: #000; border: none; padding: 14px 24px;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
  }

  /* Footer */
  .user-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    z-index: 100;
  }
  .user-bar .email { color: var(--muted); overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
  .signout-btn {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 10px;
  }
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 8px; font-size: 12px;
    z-index: 200; opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: #f43f5e; color: #f43f5e; }
  .toast.success { border-color: var(--green); color: var(--green); }

  .loading-screen {
    min-height: 60vh; display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }

  /* Section color accents */
  [data-section="Morning"] { border-left: 3px solid var(--section-morning); }
  [data-section="Focus"] { border-left: 3px solid var(--section-focus); }
  [data-section="Workout"] { border-left: 3px solid var(--section-workout); }
  [data-section="Discipline"] { border-left: 3px solid var(--section-discipline); }
</style>
</head>
<body>

<nav class="nav-top">
  <h1>Routines</h1>
  <div class="nav-links">
    <a href="./" class="nav-link">WORKOUT</a>
    <a href="routines.html" class="nav-link active">ROUTINES</a>
  </div>
</nav>

<div id="loading" class="loading-screen">Loading...</div>

<div id="login-screen" class="login-screen" hidden>
  <h2>Routines Log</h2>
  <p>매일 루틴 체크. Google 계정으로 로그인하면 폰/PC 어디서나 동기화됩니다.</p>
  <button class="signin-btn" id="signin-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
</div>

<div id="main-screen" hidden>
  <!-- Date nav -->
  <div class="date-nav">
    <button class="date-btn" id="prev-day" aria-label="Previous day">◀</button>
    <div class="date-display" id="date-display"></div>
    <button class="date-btn" id="next-day" aria-label="Next day">▶</button>
    <button class="today-btn" id="today-btn">TODAY</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label-mono">PROGRESS</div>
      <div class="stat-value" id="progress-pct">0%</div>
      <div class="stat-label" id="progress-count">0 / 0</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="label-mono">🔥 STREAK</div>
      <div class="stat-value" id="streak-count">0</div>
      <div class="stat-label">consecutive days</div>
    </div>
  </div>

  <!-- Sections of items -->
  <div id="sections-container"></div>
</div>

<div class="user-bar" id="user-bar" hidden>
  <span class="email" id="user-email"></span>
  <button class="signout-btn" id="signout-btn">Sign out</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, orderBy, limit, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmo9gyAFNfRaSR0GdyJ2BmamhpzfYuQGE",
  authDomain: "routine-log-7d91b.firebaseapp.com",
  projectId: "routine-log-7d91b",
  storageBucket: "routine-log-7d91b.firebasestorage.app",
  messagingSenderId: "271884499594",
  appId: "1:271884499594:web:12217347b04ab2448d8b73",
  measurementId: "G-M7GKKN3Y7S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const SCHEMA = {
  items: [
    {id: "wake_up", label: "기상", section: "Morning", note: "5:30 since 5/11, 5:45 before"},
    {id: "meditation", label: "명상", section: "Morning"},
    {id: "stretching", label: "Stretching", section: "Morning"},
    {id: "cold_shower", label: "Cold Shower", section: "Morning"},
    {id: "self_photo", label: "자기 사진", section: "Morning", note: "smiling self-encouragement"},
    {id: "supplements", label: "영양제", section: "Morning"},
    {id: "reading", label: "독서", section: "Focus"},
    {id: "morning_briefing", label: "Morning Briefing", section: "Focus"},
    {id: "english_vocab", label: "English Vocab", section: "Focus"},
    {id: "english_speech", label: "English Speech", section: "Focus"},
    {id: "running", label: "러닝", section: "Workout"},
    {id: "lifting", label: "리프팅", section: "Workout"},
    {id: "swimming", label: "수영", section: "Workout"},
    {id: "golf", label: "골프", section: "Workout"},
    {id: "tennis", label: "테니스", section: "Workout"},
    {id: "no_porn", label: "No Porn", section: "Discipline"},
    {id: "no_smoking", label: "No Smoking", section: "Discipline"},
  ],
  sections: [
    {key: "Morning", icon: "🌅", label: "Morning"},
    {key: "Focus", icon: "📖", label: "Focus"},
    {key: "Workout", icon: "💪", label: "Workout"},
    {key: "Discipline", icon: "🌙", label: "Discipline"},
  ],
};

const WEEKDAYS_KO = ["월","화","수","목","금","토","일"];

// State
let currentUser = null;
let currentDate = isoToday();
let currentChecks = {};  // {itemId: bool}
let saveTimer = null;

function isoToday() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function isoDate(d) { return d.toISOString().slice(0, 10); }
function parseDate(iso) { return new Date(iso + "T12:00:00"); }
function dowKo(iso) { const d = parseDate(iso); return WEEKDAYS_KO[d.getDay() === 0 ? 6 : d.getDay() - 1]; }
function addDays(iso, n) { const d = parseDate(iso); d.setDate(d.getDate() + n); return isoDate(d); }

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  setTimeout(() => t.classList.remove("show"), 1800);
}

// === Auth ===
document.getElementById("signin-btn").onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    showToast("Sign in failed: " + err.message, "error");
  }
};
document.getElementById("signout-btn").onclick = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  document.getElementById("loading").hidden = true;
  if (user) {
    currentUser = user;
    document.getElementById("login-screen").hidden = true;
    document.getElementById("main-screen").hidden = false;
    document.getElementById("user-bar").hidden = false;
    document.getElementById("user-email").textContent = user.email;
    await loadDate(currentDate);
    await refreshStreak();
  } else {
    currentUser = null;
    document.getElementById("login-screen").hidden = false;
    document.getElementById("main-screen").hidden = true;
    document.getElementById("user-bar").hidden = true;
  }
});

// === Render ===
function renderSections() {
  const container = document.getElementById("sections-container");
  const itemsBySection = {};
  for (const it of SCHEMA.items) {
    (itemsBySection[it.section] = itemsBySection[it.section] || []).push(it);
  }
  let html = "";
  for (const sec of SCHEMA.sections) {
    const items = itemsBySection[sec.key] || [];
    if (items.length === 0) continue;
    html += `<div class="section-header"><span class="section-icon">${sec.icon}</span><h3>${sec.label}</h3></div>`;
    for (const it of items) {
      const checked = currentChecks[it.id] === true;
      const noteHtml = it.note ? `<div class="item-note">${it.note}</div>` : "";
      html += `<div class="item${checked ? ' checked' : ''}" data-section="${sec.key}" data-id="${it.id}" onclick="window.toggleItem('${it.id}')">
        <div class="checkbox"></div>
        <div class="item-label">${it.label}${it.note ? `<div class="item-note">${it.note}</div>` : ''}</div>
      </div>`;
    }
  }
  container.innerHTML = html;
  updateProgress();
}

function updateProgress() {
  const total = SCHEMA.items.length;
  const done = Object.values(currentChecks).filter(v => v === true).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-count").textContent = `${done} / ${total}`;
  document.getElementById("progress-bar").style.width = pct + "%";
}

function updateDateDisplay() {
  const today = isoToday();
  const dow = dowKo(currentDate);
  document.getElementById("date-display").innerHTML = `${currentDate} <span class="dow">(${dow})</span>`;
  document.getElementById("today-btn").disabled = (currentDate === today);
}

window.toggleItem = async (itemId) => {
  currentChecks[itemId] = !currentChecks[itemId];
  // Visual update
  const el = document.querySelector(`.item[data-id="${itemId}"]`);
  if (el) el.classList.toggle("checked", currentChecks[itemId]);
  updateProgress();
  // Debounced save
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveChecks, 400);
};

async function loadDate(date) {
  currentDate = date;
  updateDateDisplay();
  currentChecks = {};
  if (!currentUser) return;
  try {
    const ref = doc(db, "users", currentUser.uid, "routines", date);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      currentChecks = snap.data().items || {};
    }
  } catch (err) {
    showToast("Load failed: " + err.message, "error");
  }
  renderSections();
}

async function saveChecks() {
  if (!currentUser) return;
  try {
    const ref = doc(db, "users", currentUser.uid, "routines", currentDate);
    await setDoc(ref, {
      items: currentChecks,
      updatedAt: serverTimestamp(),
    }, { merge: true });
    await refreshStreak();
  } catch (err) {
    showToast("Save failed: " + err.message, "error");
  }
}

async function refreshStreak() {
  if (!currentUser) return;
  // Streak: count consecutive days backward from today with progress >= 70%
  const today = isoToday();
  let streak = 0;
  const THRESHOLD = 0.7;
  for (let i = 0; i < 365; i++) {
    const d = addDays(today, -i);
    try {
      const snap = await getDoc(doc(db, "users", currentUser.uid, "routines", d));
      if (!snap.exists()) {
        if (i === 0) continue;  // today might not be done yet
        break;
      }
      const items = snap.data().items || {};
      const done = Object.values(items).filter(v => v === true).length;
      const total = SCHEMA.items.length;
      if (done / total >= THRESHOLD) {
        streak++;
      } else {
        if (i === 0) continue;  // today incomplete = don't break streak
        break;
      }
    } catch { break; }
  }
  document.getElementById("streak-count").textContent = streak;
}

// === Date navigation ===
document.getElementById("prev-day").onclick = () => loadDate(addDays(currentDate, -1));
document.getElementById("next-day").onclick = () => {
  const next = addDays(currentDate, 1);
  if (next > isoToday()) return;  // no future
  loadDate(next);
};
document.getElementById("today-btn").onclick = () => loadDate(isoToday());
</script>
</body>
</html>
